name: Claude Greptile Response

on:
  pull_request_review:
    types: [submitted]

concurrency:
  group: greptile-response-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  respond:
    if: >
      github.event.review.user.login == 'greptile-apps[bot]' &&
      github.event.review.state == 'commented'
    uses: aramiworks/.github/.github/workflows/claude-greptile-response.yml@main
    secrets: inherit
