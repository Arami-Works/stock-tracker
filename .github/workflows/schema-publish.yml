name: Schema Publish

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "develop"
        type: choice
        options: [develop, staging, production]
  push:
    branches: [main]
    paths:
      - "apps/subgraphs/**"

env:
  NODE_VERSION: 20

jobs:
  publish:
    if: vars.APOLLO_GRAPH_REF != ''
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - name: Build subgraphs
        run: npx turbo run build --filter='./apps/subgraphs/*'

      - name: Cache Rover CLI
        id: rover-cache
        uses: actions/cache@v4
        with:
          path: ~/.rover/bin
          key: rover-${{ runner.os }}

      - name: Install Rover
        if: steps.rover-cache.outputs.cache-hit != 'true'
        run: curl -sSL https://rover.apollo.dev/nix/latest | sh

      - name: Resolve Apollo graph ref
        id: graph_ref
        run: |
          BASE_REF="${{ vars.APOLLO_GRAPH_REF }}"
          GRAPH_ID="${BASE_REF%%@*}"
          DISPATCH_ENV="${{ inputs.environment }}"
          BRANCH="${{ github.ref_name }}"
          if [ -n "$DISPATCH_ENV" ] && [ "$DISPATCH_ENV" != "production" ]; then
            echo "ref=${GRAPH_ID}@${DISPATCH_ENV}" >> "$GITHUB_OUTPUT"
          elif [ "$BRANCH" = "main" ]; then
            echo "ref=${GRAPH_ID}@current" >> "$GITHUB_OUTPUT"
          else
            echo "ref=${GRAPH_ID}@${BRANCH}" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish schema
        run: |
          for schema in ./apps/subgraphs/*/schema.graphql; do
            subgraph_dir=$(dirname "$schema")
            subgraph_name=$(basename "$subgraph_dir")
            echo "Publishing $subgraph_name to $APOLLO_GRAPH_REF..."
            ~/.rover/bin/rover subgraph publish "$APOLLO_GRAPH_REF" \
              --schema "$schema" \
              --name "$subgraph_name" \
              --routing-url "http://subgraph-tracker.railway.internal:4001"
          done
        env:
          APOLLO_KEY: ${{ secrets.APOLLO_KEY }}
          APOLLO_GRAPH_REF: ${{ steps.graph_ref.outputs.ref }}
