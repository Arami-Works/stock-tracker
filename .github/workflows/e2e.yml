name: E2E

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: read

env:
  NODE_VERSION: 20

jobs:
  e2e-backend:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-node-deps
        with:
          node-version: ${{ env.NODE_VERSION }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Apply migrations
        run: npx prisma migrate deploy --schema packages/prisma/prisma/schema
        env:
          DATABASE_URL: postgresql://postgres:test@localhost:5432/test
      - name: Run API e2e tests
        run: npm run test:e2e -w apps/api
        env:
          DATABASE_URL: postgresql://postgres:test@localhost:5432/test
      - name: Run subgraph e2e tests
        run: npm run test:e2e -w apps/subgraphs/tracker
        env:
          DATABASE_URL: postgresql://postgres:test@localhost:5432/test
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-backend-results
          path: "**/test-results/"
          if-no-files-found: ignore
          retention-days: 7

  e2e-frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      MAESTRO_APP_URL: http://localhost:8080
    steps:
      - uses: actions/checkout@v4

      - name: Check for Maestro flows
        id: check-flows
        run: |
          if find apps/mobile/maestro -name '*.yaml' -o -name '*.yml' | grep -q .; then
            echo "has_flows=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_flows=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: ./.github/actions/setup-node-deps
        if: steps.check-flows.outputs.has_flows == 'true'
        with:
          node-version: ${{ env.NODE_VERSION }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build packages
        if: steps.check-flows.outputs.has_flows == 'true'
        run: npx turbo run build --filter='./packages/*'

      - name: Export web app
        if: steps.check-flows.outputs.has_flows == 'true'
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.E2E_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.E2E_SUPABASE_ANON_KEY }}
          EXPO_PUBLIC_GRAPHQL_URL: ${{ secrets.E2E_GRAPHQL_URL }}
          EXPO_PUBLIC_GOOGLE_WEB_CLIENT_ID: placeholder.apps.googleusercontent.com
          EXPO_PUBLIC_GOOGLE_IOS_CLIENT_ID: placeholder.apps.googleusercontent.com
          EXPO_PUBLIC_GOOGLE_ANDROID_CLIENT_ID: placeholder.apps.googleusercontent.com
        run: npx expo export --platform web
        working-directory: apps/mobile

      - name: Serve web app
        if: steps.check-flows.outputs.has_flows == 'true'
        working-directory: apps/mobile
        run: npx serve@latest dist -p 8080 &

      - name: Install Maestro CLI
        if: steps.check-flows.outputs.has_flows == 'true'
        run: |
          curl -fsSL -o /tmp/maestro-install.sh "https://get.maestro.mobile.dev"
          bash /tmp/maestro-install.sh
          rm /tmp/maestro-install.sh

      - name: Start virtual display
        if: steps.check-flows.outputs.has_flows == 'true'
        run: |
          Xvfb :99 -screen 0 1280x720x24 &
          echo "DISPLAY=:99" >> "$GITHUB_ENV"

      - name: Wait for server
        if: steps.check-flows.outputs.has_flows == 'true'
        run: npx wait-on http://localhost:8080 --timeout 30000

      - name: Run unauthenticated flows
        if: steps.check-flows.outputs.has_flows == 'true'
        run: |
          export PATH="$PATH:$HOME/.maestro/bin"
          maestro test --exclude-tags=authenticated apps/mobile/maestro/

      - name: Inject E2E session
        if: steps.check-flows.outputs.has_flows == 'true'
        env:
          E2E_SUPABASE_URL: ${{ secrets.E2E_SUPABASE_URL }}
          E2E_SUPABASE_ANON_KEY: ${{ secrets.E2E_SUPABASE_ANON_KEY }}
          E2E_USER_EMAIL: ${{ secrets.E2E_USER_EMAIL }}
          E2E_USER_PASSWORD: ${{ secrets.E2E_USER_PASSWORD }}
        run: node scripts/e2e-inject-session.mjs

      - name: Seed E2E test data
        if: steps.check-flows.outputs.has_flows == 'true'
        env:
          E2E_SUPABASE_URL: ${{ secrets.E2E_SUPABASE_URL }}
          E2E_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.E2E_SUPABASE_SERVICE_ROLE_KEY }}
          E2E_USER_EMAIL: ${{ secrets.E2E_USER_EMAIL }}
        run: node scripts/e2e-seed.mjs

      - name: Check GraphQL backend reachability
        if: steps.check-flows.outputs.has_flows == 'true'
        id: check-backend
        env:
          E2E_GRAPHQL_URL: ${{ secrets.E2E_GRAPHQL_URL }}
        run: |
          if curl -sf --connect-timeout 5 "$E2E_GRAPHQL_URL" > /dev/null 2>&1; then
            echo "reachable=true" >> "$GITHUB_OUTPUT"
          else
            echo "reachable=false" >> "$GITHUB_OUTPUT"
            echo "GraphQL backend unreachable — skipping authenticated flows"
          fi

      - name: Run authenticated flows
        if: steps.check-flows.outputs.has_flows == 'true' && steps.check-backend.outputs.reachable == 'true'
        run: |
          export PATH="$PATH:$HOME/.maestro/bin"
          maestro test --include-tags=authenticated apps/mobile/maestro/

      - name: Upload Maestro test results
        if: always() && steps.check-flows.outputs.has_flows == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: maestro-test-results
          path: ~/.maestro/tests/
          retention-days: 7

      - name: Skip — no Maestro flows found
        if: steps.check-flows.outputs.has_flows == 'false'
        run: echo "No Maestro flow files found in apps/mobile/maestro/ — skipping"
