name: EAS Update (OTA)

on:
  push:
    branches: [main]
    paths:
      - 'apps/mobile/src/**'
      - 'apps/mobile/app.config.ts'

  release:
    types: [published]

  workflow_dispatch:
    inputs:
      channel:
        description: "EAS update channel"
        required: true
        type: choice
        options:
          - develop
          - stage
          - master

jobs:
  update:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'release' && startsWith(github.event.release.tag_name, '@stock-tracker/mobile@')) ||
      (github.event_name == 'push' && !startsWith(github.event.head_commit.message, 'chore: version packages'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: https://npm.pkg.github.com
          scope: "@aramiworks"

      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - uses: dopplerhq/cli-action@v3

      - name: Install dependencies
        run: npm ci
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve channel
        id: channel
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ inputs.channel }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.event_name }}" = "release" ]; then
            TAG="${{ github.event.release.tag_name }}"
            VERSION="${TAG##*@}"
            if [[ "$VERSION" == *-dev.* ]]; then
              echo "name=develop" >> $GITHUB_OUTPUT
            elif [[ "$VERSION" == *-rc.* ]]; then
              echo "name=stage" >> $GITHUB_OUTPUT
            else
              echo "name=master" >> $GITHUB_OUTPUT
            fi
          else
            echo "name=master" >> $GITHUB_OUTPUT
          fi

      - name: Read package version
        id: version
        run: echo "version=$(node -p "require('./apps/mobile/package.json').version")" >> $GITHUB_OUTPUT

      - name: Publish OTA update
        working-directory: apps/mobile
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
          APP_ENV: ${{ steps.channel.outputs.name }}
        run: |
          doppler run -- eas update \
            --channel ${{ steps.channel.outputs.name }} \
            --message "v${{ steps.version.outputs.version }} — ${{ github.event.head_commit.message || github.event.release.name || 'manual dispatch' }}" \
            --non-interactive

      - name: Notify Slack
        if: success()
        run: |
          curl -s -X POST https://slack.com/api/chat.postMessage \
            -H "Authorization: Bearer ${{ secrets.SLACK_BOT_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"channel\": \"${{ vars.SLACK_CHANNEL_ENGINEERING_UPDATES }}\",
              \"text\": \"🔄 *OTA Update published* — stock-tracker v${{ steps.version.outputs.version }}\n• Channel: ${{ steps.channel.outputs.name }}\n• <https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}|View run>\"
            }"
