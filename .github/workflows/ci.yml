name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  packages: read

env:
  NODE_VERSION: 20
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}

jobs:
  paths-filter:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      code: ${{ steps.filter.outputs.code }}
      deps: ${{ steps.filter.outputs.deps }}
      prisma: ${{ steps.filter.outputs.prisma }}
      migrations: ${{ steps.filter.outputs.migrations }}
      subgraphs: ${{ steps.filter.outputs.subgraphs }}
      dockerfiles: ${{ steps.filter.outputs.dockerfiles }}
      stories: ${{ steps.filter.outputs.stories }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            code:
              - 'apps/**'
              - 'packages/**'
              - 'package.json'
              - 'package-lock.json'
              - 'turbo.json'
            deps:
              - 'package.json'
              - 'package-lock.json'
              - 'packages/*/package.json'
              - 'apps/*/package.json'
              - 'apps/subgraphs/*/package.json'
            prisma:
              - 'packages/prisma/**'
            migrations:
              - 'packages/prisma/migrations/**'
            subgraphs:
              - 'apps/subgraphs/**'
            dockerfiles:
              - 'apps/subgraphs/*/Dockerfile'
              - 'apps/api/Dockerfile'
              - 'apps/router/Dockerfile'
            stories:
              - 'apps/mobile/src/**/*.story.tsx'
              - 'apps/storybook/**'

  lint:
    needs: [paths-filter]
    if: needs.paths-filter.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-node-deps
        with:
          node-version: ${{ env.NODE_VERSION }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - run: npm run lint

  typecheck:
    needs: [paths-filter]
    if: needs.paths-filter.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-node-deps
        with:
          node-version: ${{ env.NODE_VERSION }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - run: npm run type-check

  test:
    needs: [paths-filter]
    if: needs.paths-filter.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      checks: write
      packages: read
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-node-deps
        with:
          node-version: ${{ env.NODE_VERSION }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - run: npm run test -- -- --reporters=default --reporters=jest-junit
        env:
          JEST_JUNIT_OUTPUT_DIR: test-results
          JEST_JUNIT_OUTPUT_NAME: junit.xml
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: "**/test-results/"
          if-no-files-found: ignore
          retention-days: 7
      - name: Test report
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Unit Tests
          path: "**/test-results/*.xml"
          reporter: jest-junit
          fail-on-empty: false
      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: unit
          fail_ci_if_error: false

  format:
    needs: [paths-filter]
    if: needs.paths-filter.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-node-deps
        with:
          node-version: ${{ env.NODE_VERSION }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - run: npm run format:check

  build:
    needs: [paths-filter]
    if: needs.paths-filter.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-node-deps
        with:
          node-version: ${{ env.NODE_VERSION }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - run: npm run build

  audit:
    needs: [paths-filter]
    if: needs.paths-filter.outputs.deps == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-node-deps
        with:
          node-version: ${{ env.NODE_VERSION }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - run: npm audit --audit-level=critical --omit=dev --omit=optional

  chromatic:
    needs: [paths-filter]
    if: needs.paths-filter.outputs.stories == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup-node-deps
        with:
          node-version: ${{ env.NODE_VERSION }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Build Storybook
        run: npx turbo run build --filter=@stock-tracker/storybook
      - name: Publish to Chromatic
        uses: chromaui/action@latest
        with:
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
          storybookBuildDir: apps/storybook/storybook-static
          storybookBaseDir: apps/storybook
          autoAcceptChanges: main
          onlyChanged: true

  prisma:
    needs: [paths-filter]
    if: needs.paths-filter.outputs.prisma == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-node-deps
        with:
          node-version: ${{ env.NODE_VERSION }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - run: npx prisma validate --schema packages/prisma/prisma/schema
        env:
          DATABASE_URL: postgresql://dummy:dummy@localhost:5432/dummy
      - run: npx prisma format --check --schema packages/prisma/prisma/schema

  migration:
    needs: [paths-filter]
    if: needs.paths-filter.outputs.migrations == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-node-deps
        with:
          node-version: ${{ env.NODE_VERSION }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Apply migrations
        run: npx prisma migrate deploy --schema packages/prisma/prisma/schema
        env:
          DATABASE_URL: postgresql://postgres:test@localhost:5432/test
      - name: Check schema-migration sync
        run: npx prisma migrate diff --from-migrations ./packages/prisma/prisma/migrations --to-schema-datamodel ./packages/prisma/prisma/schema --exit-code
        env:
          DATABASE_URL: postgresql://postgres:test@localhost:5432/test

  schema:
    needs: [paths-filter]
    if: needs.paths-filter.outputs.subgraphs == 'true' && vars.APOLLO_GRAPH_REF != ''
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-node-deps
        with:
          node-version: ${{ env.NODE_VERSION }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Build subgraphs
        run: npx turbo run build --filter='./apps/subgraphs/*'
      - name: Cache Rover CLI
        id: rover-cache
        uses: actions/cache@v4
        with:
          path: ~/.rover/bin
          key: rover-${{ runner.os }}
      - name: Install Rover
        if: steps.rover-cache.outputs.cache-hit != 'true'
        run: curl -sSL https://rover.apollo.dev/nix/latest | sh
      - name: Check schema
        run: ~/.rover/bin/rover subgraph check $APOLLO_GRAPH_REF --schema ./apps/subgraphs/*/schema.graphql --name stock-tracker
        env:
          APOLLO_KEY: ${{ secrets.APOLLO_KEY }}
          APOLLO_GRAPH_REF: ${{ vars.APOLLO_GRAPH_REF }}

  docker:
    needs: [paths-filter]
    if: needs.paths-filter.outputs.dockerfiles == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Find Dockerfiles
        id: dockerfiles
        run: echo "files=$(find apps/subgraphs apps/service-* -name Dockerfile 2>/dev/null | tr '\n' ' ')" >> "$GITHUB_OUTPUT"
      - name: Build Docker images
        if: steps.dockerfiles.outputs.files != ''
        run: |
          for df in ${{ steps.dockerfiles.outputs.files }}; do
            app_dir=$(dirname "$df")
            app_name=$(basename "$app_dir")
            echo "Building $app_name..."
            docker buildx build --file "$df" --load -t "$app_name:ci" .
          done

  ci-status:
    name: CI
    runs-on: ubuntu-latest
    needs:
      - paths-filter
      - lint
      - typecheck
      - test
      - format
      - build
      - audit
      - chromatic
      - prisma
      - migration
      - schema
      - docker
    if: always()
    steps:
      - name: Check all CI jobs
        run: |
          results='${{ toJSON(needs.*.result) }}'
          if echo "$results" | grep -qE '"failure"|"cancelled"'; then
            echo "One or more CI jobs failed or were cancelled"
            exit 1
          fi
          echo "All CI jobs passed or were skipped"
