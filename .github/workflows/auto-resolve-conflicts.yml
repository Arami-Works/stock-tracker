name: Auto-resolve PR conflicts

on:
  workflow_run:
    workflows: ["Auto-update PR branches"]
    types: [completed]

permissions:
  pull-requests: write
  contents: write
  issues: write

jobs:
  resolve:
    if: github.event.workflow_run.conclusion == 'success'
    uses: aramiworks/.github/.github/workflows/auto-resolve-conflicts.yml@main
    secrets: inherit
