name: Deploy Storybook

on:
  push:
    branches: [main]
    paths:
      - "apps/mobile/src/**/*.story.tsx"
      - "apps/storybook/**"
      - "packages/**"
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - master
          - stage
          - develop
        default: master

concurrency:
  group: storybook-${{ github.ref }}-${{ inputs.environment || 'master' }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: https://npm.pkg.github.com
          scope: "@aramiworks"

      - run: npm ci
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build packages
        run: npx turbo run build --filter=@stock-tracker/validation --filter=@stock-tracker/types

      - name: Build Storybook
        run: npx turbo run build --filter=@stock-tracker/storybook

      - name: Write Vercel config
        run: printf '{"github":{"enabled":false},"cleanUrls":true}\n' > apps/storybook/storybook-static/vercel.json

      - name: Configure Vercel project
        working-directory: apps/storybook/storybook-static
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_STORYBOOK_PROJECT_ID }}
        run: |
          mkdir -p .vercel
          jq -n --arg org "$VERCEL_ORG_ID" --arg proj "$VERCEL_PROJECT_ID" '{"orgId":$org,"projectId":$proj}' > .vercel/project.json

      - name: Resolve environment
        id: env
        run: |
          ENV="${{ inputs.environment || 'master' }}"
          echo "name=$ENV" >> "$GITHUB_OUTPUT"
          if [[ "$ENV" == "master" ]]; then
            echo "prod=--prod" >> "$GITHUB_OUTPUT"
            echo "alias=" >> "$GITHUB_OUTPUT"
          else
            echo "prod=" >> "$GITHUB_OUTPUT"
            echo "alias=${ENV}.storybook.stocktracker.arami.so" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy
        id: deploy
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_STORYBOOK_PROJECT_ID }}
        run: |
          DEPLOY_URL=$(npx vercel deploy --yes ${{ steps.env.outputs.prod }} \
            --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$DEPLOY_URL" >> "$GITHUB_OUTPUT"
        working-directory: apps/storybook/storybook-static

      - name: Set environment alias
        if: steps.env.outputs.alias != ''
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_STORYBOOK_PROJECT_ID }}
        run: |
          npx vercel alias set "${{ steps.deploy.outputs.url }}" \
            "${{ steps.env.outputs.alias }}" \
            --token="${{ secrets.VERCEL_TOKEN }}"
        working-directory: apps/storybook/storybook-static

      - name: Deployment summary
        run: |
          echo "### Storybook deployed" >> "$GITHUB_STEP_SUMMARY"
          echo "URL: ${{ steps.deploy.outputs.url }}" >> "$GITHUB_STEP_SUMMARY"
          if [[ -n "${{ steps.env.outputs.alias }}" ]]; then
            echo "Alias: https://${{ steps.env.outputs.alias }}" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Alias: https://storybook.stocktracker.arami.so" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Notify Slack
        if: always()
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
        run: |
          STATUS="${{ job.status == 'success' && '✅' || '❌' }}"
          ENV="${{ steps.env.outputs.name }}"
          DEPLOY_URL="${{ steps.deploy.outputs.url }}"
          ALIAS="${{ steps.env.outputs.alias }}"
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          URL="${ALIAS:+https://${ALIAS}}"
          URL="${URL:-$DEPLOY_URL}"

          curl -s -X POST https://slack.com/api/chat.postMessage \
            -H "Authorization: Bearer $SLACK_BOT_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{
              \"channel\": \"${{ vars.SLACK_CHANNEL_ENGINEERING_UPDATES }}\",
              \"text\": \"${STATUS} *Storybook Deploy* — ${ENV}\n📖 ${URL}\n🔗 <${RUN_URL}|View run>\"
            }"
