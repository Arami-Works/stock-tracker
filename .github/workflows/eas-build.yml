name: EAS Build

on:
  workflow_dispatch:
    inputs:
      profile:
        description: "EAS build profile"
        required: true
        type: choice
        options:
          - master
          - stage
          - develop
        default: master
      platform:
        description: "Target platform"
        required: true
        type: choice
        options:
          - all
          - android
          - ios
        default: all

  release:
    types: [published]

concurrency:
  group: eas-build-${{ inputs.profile || github.event.release.tag_name }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: read

jobs:
  resolve-params:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      startsWith(github.event.release.tag_name, '@stock-tracker/mobile@')
    runs-on: ubuntu-latest
    outputs:
      profile: ${{ steps.params.outputs.profile }}
      platform: ${{ steps.params.outputs.platform }}
    steps:
      - name: Resolve build parameters
        id: params
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "profile=${{ inputs.profile }}" >> "$GITHUB_OUTPUT"
            echo "platform=${{ inputs.platform }}" >> "$GITHUB_OUTPUT"
          else
            TAG="${{ github.event.release.tag_name }}"
            VERSION="${TAG##*@}"

            if [[ "$VERSION" == *-dev.* ]]; then
              echo "profile=develop" >> "$GITHUB_OUTPUT"
            elif [[ "$VERSION" == *-rc.* ]]; then
              echo "profile=stage" >> "$GITHUB_OUTPUT"
            else
              echo "profile=master" >> "$GITHUB_OUTPUT"
            fi
            echo "platform=all" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: [resolve-params]
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      matrix:
        platform: ${{ needs.resolve-params.outputs.platform == 'all' && fromJSON('["android", "ios"]') || fromJSON(format('["{0}"]', needs.resolve-params.outputs.platform)) }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: https://npm.pkg.github.com
          scope: "@aramiworks"

      - run: npm ci
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: expo/expo-github-action@v8
        with:
          eas-version: 16.4.1
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Write Apple API key
        if: matrix.platform == 'ios'
        run: |
          mkdir -p ${RUNNER_TEMP}/appstoreconnect/private_keys
          echo "${{ secrets.EXPO_APPLE_P8_KEY }}" > ${RUNNER_TEMP}/appstoreconnect/private_keys/AuthKey_${{ secrets.EXPO_APPLE_KEY_ID }}.p8

      - name: Build
        id: eas-build
        run: |
          eas build \
            --profile ${{ needs.resolve-params.outputs.profile }} \
            --platform ${{ matrix.platform }} \
            --non-interactive \
            --json | tee /tmp/eas-build-result.json
          BUILD_ID=$(jq -r '.[0].id // empty' /tmp/eas-build-result.json)
          BUILD_URL="https://expo.dev/accounts/aramiworks/projects/stock-tracker/builds/${BUILD_ID}"
          echo "build_url=$BUILD_URL" >> "$GITHUB_OUTPUT"
        working-directory: apps/mobile
        env:
          EXPO_APPLE_KEY_ID: ${{ secrets.EXPO_APPLE_KEY_ID }}
          EXPO_APPLE_ISSUER_ID: ${{ secrets.EXPO_APPLE_ISSUER_ID }}

      - name: Notify Slack
        if: always()
        run: |
          STATUS="${{ job.status == 'success' && '✅' || '❌' }}"
          PLATFORM="${{ matrix.platform }}"
          PROFILE="${{ needs.resolve-params.outputs.profile }}"
          BUILD_URL="${{ steps.eas-build.outputs.build_url }}"
          FALLBACK="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          LINK="${BUILD_URL:-$FALLBACK}"

          RESPONSE=$(curl -s -X POST https://slack.com/api/chat.postMessage \
            -H "Authorization: Bearer ${{ secrets.SLACK_BOT_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"channel\": \"${{ vars.SLACK_CHANNEL_HQ }}\",
              \"text\": \"${STATUS} *EAS Build* — ${PLATFORM} (${PROFILE})\n• <${LINK}|빌드 보기>\"
            }")
          echo "Slack response: $RESPONSE"

      - name: Cleanup Apple API key
        if: always() && matrix.platform == 'ios'
        run: rm -rf "${RUNNER_TEMP}/appstoreconnect"

  storybook:
    needs: [resolve-params]
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      matrix:
        platform: ${{ needs.resolve-params.outputs.platform == 'all' && fromJSON('["android", "ios"]') || fromJSON(format('["{0}"]', needs.resolve-params.outputs.platform)) }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: https://npm.pkg.github.com
          scope: "@aramiworks"

      - run: npm ci
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: expo/expo-github-action@v8
        with:
          eas-version: 16.4.1
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Write Apple API key
        if: matrix.platform == 'ios'
        run: |
          mkdir -p ${RUNNER_TEMP}/appstoreconnect/private_keys
          echo "${{ secrets.EXPO_APPLE_P8_KEY }}" > ${RUNNER_TEMP}/appstoreconnect/private_keys/AuthKey_${{ secrets.EXPO_APPLE_KEY_ID }}.p8

      - name: Build Storybook
        id: eas-build
        run: |
          eas build \
            --profile storybook \
            --platform ${{ matrix.platform }} \
            --non-interactive \
            --json | tee /tmp/eas-build-result.json
          BUILD_ID=$(jq -r '.[0].id // empty' /tmp/eas-build-result.json)
          BUILD_URL="https://expo.dev/accounts/aramiworks/projects/stock-tracker/builds/${BUILD_ID}"
          echo "build_url=$BUILD_URL" >> "$GITHUB_OUTPUT"
        working-directory: apps/mobile
        env:
          EXPO_APPLE_KEY_ID: ${{ secrets.EXPO_APPLE_KEY_ID }}
          EXPO_APPLE_ISSUER_ID: ${{ secrets.EXPO_APPLE_ISSUER_ID }}

      - name: Notify Slack
        if: always()
        run: |
          STATUS="${{ job.status == 'success' && '✅' || '❌' }}"
          PLATFORM="${{ matrix.platform }}"
          BUILD_URL="${{ steps.eas-build.outputs.build_url }}"
          FALLBACK="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          LINK="${BUILD_URL:-$FALLBACK}"

          RESPONSE=$(curl -s -X POST https://slack.com/api/chat.postMessage \
            -H "Authorization: Bearer ${{ secrets.SLACK_BOT_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"channel\": \"${{ vars.SLACK_CHANNEL_HQ }}\",
              \"text\": \"${STATUS} *EAS Build* — ${PLATFORM} (storybook)\n• <${LINK}|빌드 보기>\"
            }")
          echo "Slack response: $RESPONSE"

      - name: Cleanup Apple API key
        if: always() && matrix.platform == 'ios'
        run: rm -rf "${RUNNER_TEMP}/appstoreconnect"
