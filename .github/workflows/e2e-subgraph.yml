name: Subgraph E2E

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - "apps/subgraphs/tracker/**"
      - "apps/api/**"
      - "packages/prisma/**"
      - "packages/validation/**"
      - "packages/types/**"
  push:
    branches: [main]
    paths:
      - "apps/subgraphs/tracker/**"
      - "apps/api/**"
      - "packages/prisma/**"
      - "packages/validation/**"
      - "packages/types/**"

env:
  NODE_VERSION: 20
  DATABASE_URL: postgresql://postgres:postgres@localhost:5432/stock_tracker_test

permissions:
  contents: read
  packages: read

jobs:
  subgraph-e2e:
    if: github.event_name == 'push' || github.event.pull_request.base.ref == 'main'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: stock_tracker_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-node-deps
        with:
          node-version: ${{ env.NODE_VERSION }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Build packages
        run: npx turbo run build --filter='./packages/*'
      - name: Generate Prisma client
        run: npx turbo run db:generate
      - name: Push schema to test DB
        run: npx prisma db push --schema packages/prisma/prisma/schema --skip-generate
      - name: Run subgraph E2E tests
        working-directory: apps/subgraphs/tracker
        run: NODE_OPTIONS='--experimental-vm-modules' npx jest --config jest.e2e.config.ts
