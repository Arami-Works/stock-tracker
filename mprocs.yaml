procs:
  api:
    cmd:
      [
        "doppler",
        "run",
        "--project",
        "stock-tracker",
        "--config",
        "local",
        "--",
        "npm",
        "run",
        "dev:api",
      ]
    env:
      PORT: "4010"
    autostart: true

  subgraph:
    cmd:
      [
        "doppler",
        "run",
        "--project",
        "stock-tracker",
        "--config",
        "local",
        "--",
        "npm",
        "run",
        "dev:subgraph",
      ]
    env:
      PORT: "4011"
    autostart: true

  router:
    cmd:
      [
        "doppler",
        "run",
        "--project",
        "stock-tracker",
        "--config",
        "local",
        "--",
        "rover",
        "dev",
        "--supergraph-config",
        "supergraph.yaml",
        "--router-config",
        "router.yaml",
        "--supergraph-port",
        "4012",
      ]
    cwd: apps/router
    autostart: true

  ios:
    cmd:
      [
        "doppler",
        "run",
        "--project",
        "stock-tracker",
        "--config",
        "local",
        "--",
        "npx",
        "expo",
        "start",
        "--port",
        "8082",
        "--ios",
      ]
    cwd: apps/mobile
    autostart: true

  android:
    cmd:
      [
        "doppler",
        "run",
        "--project",
        "stock-tracker",
        "--config",
        "local",
        "--",
        "npx",
        "expo",
        "start",
        "--port",
        "8083",
        "--android",
      ]
    cwd: apps/mobile
    autostart: true

  web:
    cmd:
      [
        "doppler",
        "run",
        "--project",
        "stock-tracker",
        "--config",
        "local",
        "--",
        "npx",
        "expo",
        "start",
        "--port",
        "8084",
        "--web",
      ]
    cwd: apps/mobile
    autostart: true

  storybook:
    cmd:
      [
        "doppler",
        "run",
        "--project",
        "stock-tracker",
        "--config",
        "local",
        "--",
        "npm",
        "run",
        "dev:storybook",
      ]
    autostart: false
