procs:
  api:
    cmd:
      [
        "sh",
        "-c",
        "lsof -ti :4010 | xargs kill 2>/dev/null; doppler run --project stock-tracker --config local -- npx tsx watch src/server.ts",
      ]
    cwd: apps/api
    env:
      PORT: "4010"
    stop: "SIGTERM"
    autostart: true

  subgraph:
    cmd:
      [
        "sh",
        "-c",
        "lsof -ti :4011 | xargs kill 2>/dev/null; doppler run --project stock-tracker --config local -- npx tsx watch src/server.ts",
      ]
    cwd: apps/subgraphs/tracker
    env:
      PORT: "4011"
    stop: "SIGTERM"
    autostart: true

  router:
    cmd:
      [
        "sh",
        "-c",
        "lsof -ti :4012 | xargs kill 2>/dev/null; doppler run --project stock-tracker --config local -- rover dev --name tracker --url http://localhost:4011 --router-config router.yaml --supergraph-port 4012",
      ]
    cwd: apps/router
    stop: "SIGTERM"
    autostart: true

  ios:
    cmd:
      [
        "doppler",
        "run",
        "--project",
        "stock-tracker",
        "--config",
        "local",
        "--",
        "sh",
        "-c",
        "lsof -ti :8092 | xargs kill 2>/dev/null; npx expo prebuild --clean --platform ios && npx expo run:ios --port 8092",
      ]
    cwd: apps/mobile
    env:
      APP_ENV: "local"
    stop: "SIGTERM"
    autostart: true

  android:
    cmd:
      [
        "doppler",
        "run",
        "--project",
        "stock-tracker",
        "--config",
        "local",
        "--",
        "sh",
        "-c",
        "lsof -ti :8093 | xargs kill 2>/dev/null; npx expo prebuild --clean --platform android && npx expo run:android --port 8093",
      ]
    cwd: apps/mobile
    env:
      APP_ENV: "local"
    stop: "SIGTERM"
    autostart: true

  web:
    cmd:
      [
        "sh",
        "-c",
        "lsof -ti :8094 | xargs kill 2>/dev/null; doppler run --project stock-tracker --config local -- npx expo start --port 8094 --web --clear",
      ]
    cwd: apps/mobile
    env:
      APP_ENV: "local"
    stop: "SIGTERM"
    autostart: true

  storybook:
    cmd:
      [
        "sh",
        "-c",
        "lsof -ti :6006 | xargs kill 2>/dev/null; doppler run --project stock-tracker --config local -- npx storybook dev -p 6006",
      ]
    cwd: apps/storybook
    env:
      BROWSER: "open"
    stop: "SIGTERM"
    autostart: true
