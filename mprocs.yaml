procs:
  api:
    cmd:
      [
        "doppler",
        "run",
        "--project",
        "stock-tracker",
        "--config",
        "local",
        "--",
        "npx",
        "tsx",
        "watch",
        "src/server.ts",
      ]
    cwd: apps/api
    env:
      PORT: "4010"
    stop: "SIGTERM"
    autostart: true

  subgraph:
    cmd:
      [
        "doppler",
        "run",
        "--project",
        "stock-tracker",
        "--config",
        "local",
        "--",
        "npx",
        "tsx",
        "watch",
        "src/server.ts",
      ]
    cwd: apps/subgraphs/tracker
    env:
      PORT: "4011"
    stop: "SIGTERM"
    autostart: true

  router:
    cmd:
      [
        "doppler",
        "run",
        "--project",
        "stock-tracker",
        "--config",
        "local",
        "--",
        "rover",
        "dev",
        "--name",
        "tracker",
        "--url",
        "http://localhost:4011",
        "--router-config",
        "router.yaml",
        "--supergraph-port",
        "4012",
      ]
    cwd: apps/router
    stop: "SIGTERM"
    autostart: true

  ios:
    cmd:
      [
        "doppler",
        "run",
        "--project",
        "stock-tracker",
        "--config",
        "local",
        "--",
        "npx",
        "expo",
        "run:ios",
        "--port",
        "8092",
      ]
    cwd: apps/mobile
    env:
      APP_ENV: "local"
    stop: "SIGTERM"
    autostart: true

  android:
    cmd:
      [
        "doppler",
        "run",
        "--project",
        "stock-tracker",
        "--config",
        "local",
        "--",
        "npx",
        "expo",
        "run:android",
        "--port",
        "8093",
      ]
    cwd: apps/mobile
    env:
      APP_ENV: "local"
    stop: "SIGTERM"
    autostart: true

  web:
    cmd:
      [
        "doppler",
        "run",
        "--project",
        "stock-tracker",
        "--config",
        "local",
        "--",
        "npx",
        "expo",
        "start",
        "--port",
        "8094",
        "--web",
        "--clear",
      ]
    cwd: apps/mobile
    env:
      APP_ENV: "local"
    stop: "SIGTERM"
    autostart: true

  storybook:
    cmd:
      [
        "doppler",
        "run",
        "--project",
        "stock-tracker",
        "--config",
        "local",
        "--",
        "npx",
        "storybook",
        "dev",
        "-p",
        "6006",
      ]
    cwd: apps/storybook
    stop: "SIGTERM"
    autostart: true
