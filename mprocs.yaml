procs:
  api:
    cmd:
      [
        "doppler",
        "run",
        "--project",
        "stock-tracker",
        "--config",
        "local",
        "--",
        "npx",
        "tsx",
        "watch",
        "src/server.ts",
      ]
    cwd: apps/api
    env:
      PORT: "4010"
    autostart: true

  subgraph:
    cmd:
      [
        "doppler",
        "run",
        "--project",
        "stock-tracker",
        "--config",
        "local",
        "--",
        "npx",
        "tsx",
        "watch",
        "src/server.ts",
      ]
    cwd: apps/subgraphs/tracker
    env:
      PORT: "4011"
    autostart: true

  router:
    cmd:
      [
        "doppler",
        "run",
        "--project",
        "stock-tracker",
        "--config",
        "local",
        "--",
        "rover",
        "dev",
        "--name",
        "tracker",
        "--url",
        "http://localhost:4011",
        "--router-config",
        "router.yaml",
        "--supergraph-port",
        "4012",
      ]
    cwd: apps/router
    autostart: true

  ios:
    cmd:
      [
        "doppler",
        "run",
        "--project",
        "stock-tracker",
        "--config",
        "local",
        "--",
        "npx",
        "expo",
        "start",
        "--port",
        "8092",
        "--ios",
      ]
    cwd: apps/mobile
    autostart: true

  android:
    cmd:
      [
        "doppler",
        "run",
        "--project",
        "stock-tracker",
        "--config",
        "local",
        "--",
        "npx",
        "expo",
        "start",
        "--port",
        "8093",
        "--android",
      ]
    cwd: apps/mobile
    autostart: true

  web:
    cmd:
      [
        "doppler",
        "run",
        "--project",
        "stock-tracker",
        "--config",
        "local",
        "--",
        "npx",
        "expo",
        "start",
        "--port",
        "8094",
        "--web",
      ]
    cwd: apps/mobile
    autostart: true

  storybook:
    cmd:
      [
        "doppler",
        "run",
        "--project",
        "stock-tracker",
        "--config",
        "local",
        "--",
        "npm",
        "run",
        "dev:storybook",
      ]
    autostart: false
