# docker-compose.yml — local backend development
#
# Apollo Router is NOT included here. It runs natively via `npm run dev:router`
# (rover dev) because it needs direct access to the supergraph schema files
# and hot-reloads subgraph changes. Connect it to these services by setting
# TRPC_SERVICE_URL=http://localhost:4000 in your environment.

services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - "4000:4000"
    env_file:
      - .env.local

  subgraph:
    build:
      context: .
      dockerfile: apps/subgraphs/tracker/Dockerfile
    ports:
      - "4001:4001"
    environment:
      - TRPC_SERVICE_URL=http://api:4000
    env_file:
      - .env.local
    depends_on:
      - api
