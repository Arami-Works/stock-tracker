appId: so.arami.stocktracker.app
url: ${MAESTRO_APP_URL}
name: Cross-Flow Integration
tags:
  - authenticated
  - integration
---
# Full cycle: create account → add purchase → verify in history → clean up

# Step 1: Navigate to accounts tab
- launchApp
- tapOn: "계좌"
- assertVisible:
    id: "accounts-list-screen"

# Step 2: Create a new account
- tapOn:
    id: "add-account-fab"
- assertVisible:
    id: "account-form-storeName"
- tapOn:
    id: "account-form-storeName"
- inputText: "통합 테스트 부티크"
- tapOn:
    id: "account-form-submit"
- assertVisible: "통합 테스트 부티크"

# Step 3: Navigate into the new account
- tapOn: "통합 테스트 부티크"
- assertVisible:
    id: "accounts-detail-screen"

# Step 4: Create a purchase in the new account
- tapOn:
    id: "accounts-detail-add-purchase"
- assertVisible:
    id: "purchase-form-itemName"
- tapOn:
    id: "purchase-form-itemName"
- inputText: "통합 테스트 링"
- tapOn:
    id: "purchase-form-amount"
- inputText: "2000000"
- tapOn:
    id: "purchase-form-purchaseDate"
- inputText: "2025-04-01"
- tapOn:
    id: "purchase-form-submit"
- assertVisible: "통합 테스트 링"

# Step 5: Navigate to history tab and verify the purchase appears
- tapOn: "히스토리"
- assertVisible:
    id: "history-browse-screen"
- tapOn:
    id: "date-filter-all"
- assertVisible: "통합 테스트 링"

# Step 6: Go back to accounts tab and navigate into the account
- tapOn: "계좌"
- assertVisible:
    id: "accounts-list-screen"
- tapOn: "통합 테스트 부티크"
- assertVisible:
    id: "accounts-detail-screen"

# Step 7: Delete the purchase
- tapOn:
    id: "purchase-delete-.*"
    below: "통합 테스트 링"
- tapOn: "삭제"
- assertNotVisible: "통합 테스트 링"

# Step 8: Delete the account
- tapOn:
    id: "accounts-detail-delete"
- tapOn: "삭제"

# Step 9: Verify account is gone from the list
- assertVisible:
    id: "accounts-list-screen"
- assertNotVisible: "통합 테스트 부티크"
