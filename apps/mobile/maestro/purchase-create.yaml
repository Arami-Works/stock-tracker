appId: so.arami.stocktracker.app
url: ${MAESTRO_APP_URL}
name: Purchase - Create
tags:
  - authenticated
  - crud
---
- launchApp
- tapOn: "계좌"
- assertVisible:
    id: "accounts-list-screen"

# Navigate to account detail
- tapOn: "까르띠에 청담"
- assertVisible:
    id: "accounts-detail-screen"

# Open purchase form
- tapOn:
    id: "accounts-detail-add-purchase"
- assertVisible:
    id: "purchase-form-itemName"

# Fill in purchase details
- tapOn:
    id: "purchase-form-itemName"
- inputText: "테스트 팔찌"
- tapOn:
    id: "purchase-form-amount"
- inputText: "5500000"
- tapOn:
    id: "purchase-form-purchaseDate"
- inputText: "2025-04-01"
- tapOn:
    id: "purchase-form-submit"

# Verify purchase appears in detail
- assertVisible:
    id: "accounts-detail-screen"
- assertVisible: "테스트 팔찌"
