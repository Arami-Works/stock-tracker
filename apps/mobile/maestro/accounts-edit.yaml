appId: so.arami.stocktracker.app
url: ${MAESTRO_APP_URL}
name: Accounts - Edit
tags:
  - authenticated
  - crud
---
- launchApp
- tapOn: "계좌"
- assertVisible:
    id: "accounts-list-screen"

# Navigate to an account that other flows don't assert on
- tapOn: "까르띠에 롯데"
- assertVisible:
    id: "accounts-detail-screen"

# Open edit modal
- tapOn:
    id: "accounts-detail-edit"
- assertVisible:
    id: "edit-account-form-storeName"

# Edit the notes field (non-destructive to other flows)
- tapOn:
    id: "edit-account-form-notes"
- inputText: "E2E 수정 테스트"
- tapOn:
    id: "edit-account-form-submit"

# Verify back on detail screen
- assertVisible:
    id: "accounts-detail-screen"
