appId: so.arami.stocktracker.app
url: ${MAESTRO_APP_URL}
name: Accounts - Create
tags:
  - authenticated
  - crud
---
- launchApp
- tapOn: "계좌"
- assertVisible:
    id: "accounts-list-screen"
- tapOn:
    id: "add-account-fab"
- assertVisible:
    id: "account-form-storeName"
- tapOn:
    id: "account-form-storeName"
- inputText: "테스트 부티크"
- tapOn:
    id: "account-form-saName"
- inputText: "테스트 SA"
- tapOn:
    id: "account-form-submit"
- assertVisible:
    id: "accounts-list-screen"
- assertVisible: "테스트 부티크"
