appId: so.arami.stocktracker.app
url: ${MAESTRO_APP_URL}
name: Accounts - Detail
tags:
  - authenticated
---
- launchApp
- tapOn: "계좌"
- assertVisible:
    id: "accounts-list-screen"
- tapOn: "까르띠에 청담"
- assertVisible:
    id: "accounts-detail-screen"
- assertVisible: "SA 상세"
- assertVisible:
    id: "accounts-detail-sa-header"
- assertVisible:
    id: "accounts-detail-tank-status"
- assertVisible: "러브 브레이슬릿"
- assertVisible:
    id: "accounts-detail-add-purchase"
- tapOn:
    id: "accounts-detail-back"
- assertVisible:
    id: "accounts-list-screen"
