appId: so.arami.stocktracker.app
name: History - Browse
tags:
  - authenticated
---
- launchApp
- tapOn: "히스토리"
- assertVisible:
    id: "history-browse-screen"
- assertVisible:
    id: "history-browse-title"
- assertVisible: "구매 히스토리"
- assertVisible:
    id: "date-filter-bar"
- assertVisible:
    id: "date-filter-thisMonth"
- assertVisible:
    id: "date-filter-threeMonths"
- assertVisible:
    id: "date-filter-thisYear"
- assertVisible:
    id: "date-filter-all"
- tapOn:
    id: "date-filter-threeMonths"
- tapOn:
    id: "date-filter-all"
