appId: so.arami.stocktracker.app
url: ${MAESTRO_APP_URL}
name: Accounts - Delete
tags:
  - authenticated
  - crud
---
# Self-contained: create an account, then delete it
- launchApp
- tapOn: "계좌"
- assertVisible:
    id: "accounts-list-screen"

# Create a temporary account to delete
- tapOn:
    id: "add-account-fab"
- assertVisible:
    id: "account-form-storeName"
- tapOn:
    id: "account-form-storeName"
- inputText: "삭제 테스트 부티크"
- tapOn:
    id: "account-form-submit"
- assertVisible: "삭제 테스트 부티크"

# Navigate into the account
- tapOn: "삭제 테스트 부티크"
- assertVisible:
    id: "accounts-detail-screen"

# Delete via detail screen button
- tapOn:
    id: "accounts-detail-delete"
- tapOn: "삭제"

# Verify navigated back and account is gone
- assertVisible:
    id: "accounts-list-screen"
- assertNotVisible: "삭제 테스트 부티크"
