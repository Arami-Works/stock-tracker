appId: so.arami.stocktracker.app
url: ${MAESTRO_APP_URL}
name: Purchase - Delete
tags:
  - authenticated
  - crud
---
# Self-contained: create a purchase, then delete it
- launchApp
- tapOn: "계좌"
- assertVisible:
    id: "accounts-list-screen"

# Navigate to account
- tapOn: "까르띠에 롯데"
- assertVisible:
    id: "accounts-detail-screen"

# Create a temporary purchase to delete
- tapOn:
    id: "accounts-detail-add-purchase"
- assertVisible:
    id: "purchase-form-itemName"
- tapOn:
    id: "purchase-form-itemName"
- inputText: "삭제 테스트 링"
- tapOn:
    id: "purchase-form-amount"
- inputText: "1000000"
- tapOn:
    id: "purchase-form-purchaseDate"
- inputText: "2025-04-01"
- tapOn:
    id: "purchase-form-submit"

# Verify purchase was created
- assertVisible: "삭제 테스트 링"

# Delete the purchase via its delete button
- tapOn:
    id: "purchase-delete-.*"
    below: "삭제 테스트 링"
- tapOn: "삭제"

# Verify purchase is gone
- assertNotVisible: "삭제 테스트 링"
