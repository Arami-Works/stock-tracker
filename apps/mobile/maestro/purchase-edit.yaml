appId: so.arami.stocktracker.app
url: ${MAESTRO_APP_URL}
name: Purchase - Edit
tags:
  - authenticated
  - crud
---
- launchApp
- tapOn: "계좌"
- assertVisible:
    id: "accounts-list-screen"

# Navigate to account with a purchase to edit
- tapOn: "까르띠에 롯데"
- assertVisible:
    id: "accounts-detail-screen"

# Tap edit on the purchase (까르띠에 롯데 has "탱크 워치")
- assertVisible: "탱크 워치"
- tapOn:
    id: "purchase-edit-.*"
    below: "탱크 워치"
- assertVisible:
    id: "purchase-form-itemName"

# Clear and update the notes field
- tapOn:
    id: "purchase-form-notes"
- inputText: "E2E 수정 테스트"
- tapOn:
    id: "purchase-form-submit"

# Verify back on detail screen
- assertVisible:
    id: "accounts-detail-screen"
