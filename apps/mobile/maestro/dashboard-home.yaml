appId: so.arami.stocktracker.app
name: Dashboard - Home
tags:
  - authenticated
---
- launchApp
- assertVisible:
    id: "dashboard-home-screen"
- assertVisible:
    id: "dashboard-home-title"
- assertVisible: "대시보드"
- assertVisible:
    id: "eligibility-badge"
- assertVisible:
    id: "spend-summary-card"
- assertVisible:
    id: "add-account-fab"
- assertVisible:
    id: "refresh-fab"
- scrollUntilVisible:
    element:
      id: "sa-card-.*"
    direction: DOWN
    timeout: 3000
