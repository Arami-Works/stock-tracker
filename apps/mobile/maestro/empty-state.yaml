appId: so.arami.stocktracker.app
url: ${MAESTRO_APP_URL}
name: Empty State
tags:
  - authenticated
  - integration
---
# Verify empty purchase list state by creating a fresh account with no purchases

# Step 1: Navigate to accounts tab
- launchApp
- tapOn: "계좌"
- assertVisible:
    id: "accounts-list-screen"

# Step 2: Create a temporary account
- tapOn:
    id: "add-account-fab"
- assertVisible:
    id: "account-form-storeName"
- tapOn:
    id: "account-form-storeName"
- inputText: "빈 상태 테스트 부티크"
- tapOn:
    id: "account-form-submit"
- assertVisible: "빈 상태 테스트 부티크"

# Step 3: Navigate into the account and verify empty purchase list
- tapOn: "빈 상태 테스트 부티크"
- assertVisible:
    id: "accounts-detail-screen"
- assertVisible:
    id: "accounts-detail-empty-state"

# Step 4: Clean up — delete the account
- tapOn:
    id: "accounts-detail-delete"
- tapOn: "삭제"

# Step 5: Verify back on accounts list and account is gone
- assertVisible:
    id: "accounts-list-screen"
- assertNotVisible: "빈 상태 테스트 부티크"
