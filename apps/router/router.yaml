# Apollo Router configuration
# JWT validation via Supabase JWKS
authentication:
  router:
    jwt:
      jwks:
        - url: ${env.SUPABASE_JWKS_URL}

# Map JWT claims to headers for subgraphs
headers:
  all:
    request:
      - insert:
          name: x-user-id
          from_context: claims.sub
      - insert:
          name: x-user-role
          from_context: claims.role
      - propagate:
          named: x-request-id

cors:
  policies:
    - origins:
        - http://localhost:8081
        - http://localhost:8092
        - http://localhost:8093
        - http://localhost:8094
        - http://localhost:4012
        - http://localhost:19006
        - ${env.ALLOWED_ORIGINS}
      allow_headers:
        - authorization
        - content-type
        - x-user-id
        - x-user-role
        - x-request-id

supergraph:
  introspection: true
  listen: 0.0.0.0:4002

homepage:
  enabled: false

sandbox:
  enabled: true
