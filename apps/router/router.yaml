# Apollo Router configuration
# JWT validation via Supabase JWKS
authentication:
  router:
    jwt:
      jwks:
        - url: ${env.SUPABASE_JWKS_URL}

# Map JWT claims to headers for subgraphs
headers:
  all:
    request:
      - insert:
          name: x-user-id
          from_context: claims.sub
      - insert:
          name: x-user-role
          from_context: claims.role

cors:
  policies:
    - origins:
        - ${env.ALLOWED_ORIGINS}
      allow_headers:
        - authorization
        - content-type
        - x-user-id
        - x-user-role

supergraph:
  introspection: true
  listen: 0.0.0.0:4002

sandbox:
  enabled: true
